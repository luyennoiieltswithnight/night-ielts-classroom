            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
            border: 1px solid #f1f5f9;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.08), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: #e2e8f0;
        }

        /* Màu nền icon gradient cho từng kỹ năng */

        .icon-bg-vocab { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: #c2410c; }
        .icon-bg-ai { background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); color: #4f46e5; }
    </style>
</head>
